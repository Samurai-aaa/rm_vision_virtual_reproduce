# 此文件的内容将覆盖默认参数，并且在运行时被加载到 ROS 2 参数服务器中。

simple_armor_detector:
  ros__parameters:
    image_topic: "/image_raw"
    camera_info_topic: "/camera_info"

    # 目标颜色
    enemy_color: "red"

    # 二值化阈值
    binary_thres: 65

    # 灯条参数
    min_light_area: 5.0
    min_light_ratio: 2.5
    max_light_angle: 40.0

    # 装甲板参数
    max_angle_diff: 10.0
    max_height_diff_ratio: 0.6
    max_y_diff_ratio: 0.5
    min_armor_ratio: 0.8
    max_armor_ratio: 3.2
    max_light_x_distance: 130.0
    max_armor_tilt_angle: 10.0

    # 形态学操作参数
    morph_kernel_width: 1
    morph_kernel_height: 3

    # 是否启用 PnP 位姿估计
    enable_pnp: true

    # 装甲板尺寸，单位 mm
    small_armor_width: 135.0
    small_armor_height: 55.0
    large_armor_width: 225.0
    large_armor_height: 55.0