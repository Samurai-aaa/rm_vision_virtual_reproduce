simple_armor_detector:
  ros__parameters:
    image_topic: "/image_raw"

    # red 或 blue
    enemy_color: "red"

    # 二值化阈值，暗光视频建议先用 40~80
    binary_thres: 50

    # 灯条筛选
    min_light_area: 5.0
    min_light_ratio: 1.2
    max_light_angle: 60.0

    # 装甲板匹配
    max_angle_diff: 15.0
    max_height_diff_ratio: 0.5
    max_y_diff_ratio: 0.6
    min_armor_ratio: 0.6
    max_armor_ratio: 3.5
    max_light_x_distance: 250.0

    # 形态学核，暗光断裂灯条可以适当加大高度
    morph_kernel_width: 3
    morph_kernel_height: 9
